services:
  app:
    build:
      context: .
      target: development
    ports:
      - "${EXPO_PORT:-19006}:19006"
    environment:
      EXPO_PUBLIC_SUPABASE_URL: "${EXPO_PUBLIC_SUPABASE_URL}"
      EXPO_PUBLIC_SUPABASE_ANON_KEY: "${EXPO_PUBLIC_SUPABASE_ANON_KEY}"
      EXPO_USE_FAST_RESOLVER: "1"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - expo_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run web -- --host 0.0.0.0 --port 19006"

  app-prod:
    build:
      context: .
      target: production
      args:
        EXPO_PUBLIC_SUPABASE_URL: "${EXPO_PUBLIC_SUPABASE_URL}"
        EXPO_PUBLIC_SUPABASE_ANON_KEY: "${EXPO_PUBLIC_SUPABASE_ANON_KEY}"
    ports:
      - "${EXPO_PROD_PORT:-8080}:80"
    profiles:
      - prod

volumes:
  expo_node_modules:
